---
# ④ api-deployment.yaml
# FastAPI application — Deployment + ClusterIP Service.
# Exposed externally via ingress.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-api
  namespace: fte
  labels:
    app: fte-api
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fte-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: fte-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: techcorp/customer-success-fte:latest
          imagePullPolicy: Always
          command: ["uvicorn", "production.api.main:app"]
          args:
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--workers=4"
            - "--log-level=info"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: fte-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fte-secrets
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fte-secrets
                  key: OPENAI_API_KEY
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: fte-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fte-secrets
                  key: TWILIO_AUTH_TOKEN
          volumeMounts:
            - name: gmail-credentials
              mountPath: /secrets/gmail
              readOnly: true
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: gmail-credentials
          secret:
            secretName: gmail-service-account   # mounted from separate secret
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: fte-api
  namespace: fte
  labels:
    app: fte-api
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: api
spec:
  selector:
    app: fte-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
