---
# ⑧ hpa.yaml
# Horizontal Pod Autoscalers for API and Worker deployments.
# Requires metrics-server installed in the cluster:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

# ── API HPA ───────────────────────────────────────────────────
# Scales the FastAPI deployment based on CPU utilization.
# Min 2 replicas (HA), max 10 (cost guard).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fte-api-hpa
  namespace: fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fte-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60     # react quickly to traffic spikes
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # scale down slowly to avoid flapping
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# ── Worker HPA ────────────────────────────────────────────────
# Scales the Kafka message processor based on CPU.
# Cap at 4 — limited by inbound topic partition count (4 partitions each).
# Adding more replicas than partitions wastes resources (idle consumers).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fte-worker-hpa
  namespace: fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fte-worker
  minReplicas: 2
  maxReplicas: 4                         # matches email/whatsapp partition count
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 90
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600    # workers: very conservative scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
