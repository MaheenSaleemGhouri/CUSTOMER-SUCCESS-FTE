---
# ③ secrets.yaml
# TEMPLATE — replace all <PLACEHOLDER> values before applying.
# In production use a secrets manager (Vault, AWS Secrets Manager,
# GCP Secret Manager) rather than committing this file.
#
# Generate base64: echo -n "value" | base64
#
# kubectl apply -f secrets.yaml  (after substitution)
# Or seal with: kubeseal --format yaml < secrets.yaml > secrets.sealed.yaml
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: fte
  labels:
    app.kubernetes.io/name: customer-success-fte
type: Opaque
data:
  # PostgreSQL DSN — asyncpg format
  # e.g. postgresql://fte_user:password@postgres.fte.svc.cluster.local/techcorp
  DATABASE_URL: <BASE64_DATABASE_URL>

  # OpenAI API key
  OPENAI_API_KEY: <BASE64_OPENAI_API_KEY>

  # Twilio credentials
  TWILIO_ACCOUNT_SID:   <BASE64_TWILIO_ACCOUNT_SID>
  TWILIO_AUTH_TOKEN:    <BASE64_TWILIO_AUTH_TOKEN>

  # PostgreSQL superuser password (used by postgres StatefulSet)
  POSTGRES_PASSWORD: <BASE64_POSTGRES_PASSWORD>
  POSTGRES_USER:     <BASE64_POSTGRES_USER>     # e.g. fte_user
  POSTGRES_DB:       <BASE64_POSTGRES_DB>        # e.g. techcorp
